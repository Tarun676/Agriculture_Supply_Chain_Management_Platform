# Spring Boot Configuration for Testing (using H2)
spring.application.name=agri-platform-test

# Use H2 in-memory database with PostgreSQL compatibility mode
spring.datasource.url=jdbc:h2:mem:agri_db_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Hibernate configuration for test environment
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Server port for testing
server.port=8081
