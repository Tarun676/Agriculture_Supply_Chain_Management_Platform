version: '3.8'

services:
  agri-db:
    image: postgres:15-alpine
    container_name: agri-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: agri_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - agri-network

  agri-pgadmin:
    image: dpage/pgadmin4:latest
    container_name: agri-pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@agriplatform.com
      PGADMIN_DEFAULT_PASSWORD: adminpassword
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      agri-db:
        condition: service_healthy
    networks:
      - agri-network

  agri-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: agri-backend
    restart: always
    environment:
      DB_HOST: agri-db
      DB_PORT: 5432
      DB_NAME: agri_db
      DB_USER: postgres
      DB_PASSWORD: postgrespassword
    ports:
      - "8080:8080"
    depends_on:
      agri-db:
        condition: service_healthy
    networks:
      - agri-network

  agri-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: agri-frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - agri-backend
    networks:
      - agri-network

networks:
  agri-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local
