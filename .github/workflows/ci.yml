name: Peak Capstone DevOps CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # Job 1: Build & Verify Spring Boot Backend (Maven)
  backend-compilation:
    runs-on: ubuntu-latest
    name: ☕ Maven Build & Test Suite
    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'

    - name: Execute Test Suite with Maven
      run: |
        mvn -B clean test -f backend/pom.xml

  # Job 2: Build & Verify React Frontend (Node + Vite)
  frontend-compilation:
    runs-on: ubuntu-latest
    name: ⚛️ Node.js Vite Build Verification
    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
        cache-dependency-path: frontend/package.json

    - name: Install Dependencies
      run: npm ci --prefix frontend

    - name: Compile Vite Assets
      run: npm run build --prefix frontend

  # Job 3: Verify Multi-Container Docker Registry Readiness (Docker)
  docker-validation:
    needs: [backend-compilation, frontend-compilation]
    runs-on: ubuntu-latest
    name: 🐳 Docker Containerization Proof
    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Validate Backend Docker Build
      run: |
        docker build --no-cache -t agri-backend:ci-test ./backend

    - name: Validate Frontend Docker Build
      run: |
        docker build --no-cache -t agri-frontend:ci-test ./frontend

      